name: Automatización de Datos

on:
  schedule:
    # 23:00 UTC (20:00 Argentina aproximadamente)
    - cron: "0 23 * * *"

  workflow_dispatch:

jobs:
  actualizar:
    runs-on: ubuntu-latest

    steps:
      # Clonar repositorio
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      # Instalar Python
      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # Instalar dependencias
      - name: Instalar dependencias
        working-directory: "Automatización de Datos"
        run: |
          python -m pip install --upgrade pip

          pip install \
            yfinance \
            pandas \
            matplotlib \
            numpy \
            xlrd \
            openpyxl \
            pandas-datareader \
            imf-reader

      # Ejecutar script
      - name: Ejecutar script
        working-directory: "Automatización de Datos"
        run: |
          python ejecutar_codigo.py

      # Configurar Git
      - name: Configurar Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      # Guardar únicamente los cambios de la carpeta
      - name: Commit y Push
        run: |
          git add "Automatización de Datos/"

          if git diff --cached --quiet; then
            echo "No hubo cambios."
            exit 0
          fi

          git commit -m "Actualización automática de datos"
          git push
